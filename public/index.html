<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gia nhập Capsule Thời Gian - TimeSeal</title>
  
  <!-- Premium Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #1e1b4b 50%, #090514 100%);
      --card-bg: rgba(30, 27, 75, 0.45);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.5);
      --accent: #f59e0b;
      --text: #ffffff;
      --muted: #a5b4fc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Ambient Glowing Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.15;
    }
    .orb-1 {
      width: 300px;
      height: 300px;
      background: var(--primary);
      top: 10%;
      left: -50px;
      animation: float 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 250px;
      height: 250px;
      background: var(--accent);
      bottom: 10%;
      right: -50px;
      animation: float 6s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.1); }
    }

    /* Main Card Container */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      padding: 40px 30px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      z-index: 10;
      position: relative;
    }

    /* Logo & Icon Styling */
    .logo-container {
      margin-bottom: 24px;
      position: relative;
      display: inline-block;
    }
    
    .icon-wrapper {
      width: 90px;
      height: 90px;
      background: rgba(99, 102, 241, 0.12);
      border: 2px dashed var(--primary);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      box-shadow: 0 0 30px var(--primary-glow);
      animation: pulse 2s infinite ease-in-out;
    }

    .key-badge {
      position: absolute;
      bottom: -6px;
      right: -6px;
      background: var(--accent);
      color: #0f0c1b;
      font-size: 20px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--primary-glow); }
      50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(99, 102, 241, 0.7); }
    }

    /* Typography */
    h1 {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(to right, #ffffff, #c7d2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 30px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .invite-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 30px;
    }

    .invite-text {
      font-size: 15px;
      line-height: 22px;
      color: #e2e8f0;
    }

    .capsule-id {
      display: inline-block;
      margin-top: 8px;
      font-family: monospace;
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      letter-spacing: 0.5px;
      font-weight: bold;
    }

    /* Countdown Indicator */
    .countdown-text {
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(245, 158, 11, 0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 54px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      margin-bottom: 12px;
    }

    .btn-primary {
      background: linear-gradient(90deg, #6366f1, #4f46e5);
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(99, 102, 241, 0.45);
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      color: var(--text);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.25);
    }

    /* Store Links Footer */
    .footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .footer-title {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .store-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .store-btn {
      flex: 1;
      height: 38px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      font-weight: bold;
      text-decoration: none;
      transition: all 0.2s;
    }

    .store-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .store-icon {
      margin-right: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <div class="logo-container">
      <div class="icon-wrapper">
        <!-- Cube SVG representing Time Capsule -->
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
      </div>
      <div class="key-badge">🔑</div>
    </div>

    <h1>TimeSeal</h1>
    <div class="subtitle">Ký Ức Thời Gian</div>

    <div class="invite-box">
      <p class="invite-text">
        Bạn nhận được lời mời đặc biệt tham gia cùng mở khoá chiếc hộp thời gian bí mật!
      </p>
      <span class="capsule-id" id="capsule-display-id">Mã: ------</span>
    </div>

    <!-- Redirect Countdown Banner -->
    <div class="countdown-text" id="status-text">
      <div class="spinner"></div>
      <span>Đang kết nối ứng dụng trong 3 giây...</span>
    </div>

    <button class="btn btn-primary" onclick="triggerRedirect()">Mở trong ứng dụng</button>
    <button class="btn btn-outline" onclick="copyIdToClipboard()">Sao chép mã mời</button>

    <div class="footer">
      <div class="footer-title">Chưa có ứng dụng TimeSeal?</div>
      <div class="store-buttons">
        <a href="https://play.google.com" class="store-btn" target="_blank">
          <span class="store-icon">🤖</span> Google Play
        </a>
        <a href="https://apple.com/app-store" class="store-btn" target="_blank">
          <span class="store-icon">🍏</span> App Store
        </a>
      </div>
    </div>
  </div>

  <script>
    // 1. Extract capsuleId from URL queries (case insensitive)
    const urlParams = new URLSearchParams(window.location.search);
    const capsuleId = urlParams.get('capsuleId') || urlParams.get('capsuleid');
    
    if (capsuleId) {
      document.getElementById('capsule-display-id').textContent = 'Mã: ' + capsuleId;
    } else {
      document.getElementById('capsule-display-id').textContent = 'Mã mời không hợp lệ';
      document.getElementById('status-text').style.display = 'none';
    }

    const deepLink = 'timeseal://invite?capsuleId=' + (capsuleId || '');

    // 2. Perform automatic redirect with a nice countdown
    let count = 3;
    const statusText = document.querySelector('#status-text span');
    
    if (capsuleId) {
      const interval = setInterval(() => {
        count--;
        if (count > 0) {
          statusText.textContent = `Đang kết nối ứng dụng trong ${count} giây...`;
        } else {
          clearInterval(interval);
          document.getElementById('status-text').style.display = 'none';
          triggerRedirect();
        }
      }, 1000);
    }

    // 3. Redirection trigger
    function triggerRedirect() {
      if (!capsuleId) {
        alert('Mã mời không tồn tại hoặc không hợp lệ.');
        return;
      }
      window.location.href = deepLink;
    }

    // 4. Copy Code Fallback
    function copyIdToClipboard() {
      if (!capsuleId) {
        alert('Không tìm thấy mã để sao chép.');
        return;
      }
      navigator.clipboard.writeText(capsuleId).then(() => {
        alert('Đã sao chép mã mời: ' + capsuleId + '\nHãy dán mã này vào mục nhập mã mời trên app của bạn nhé!');
      }).catch(() => {
        alert('Không thể tự động sao chép. Mã của bạn là: ' + capsuleId);
      });
    }
  </script>
</body>
</html>
